[start]
command:sh /usr/local/etc/rc.d/os-ttyd start
parameters:
type:script
message:starting ttyd

[stop]
command:sh /usr/local/etc/rc.d/os-ttyd stop
parameters:
type:script
message:stopping ttyd

[restart]
command:sh /usr/local/etc/rc.d/os-ttyd restart
parameters:
type:script
message:restarting ttyd
description:Restart ttyd service

[status]
command:sh /usr/local/etc/rc.d/os-ttyd status
parameters:
type:script_output
message:request ttyd status
